apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: greenearth-local

resources:
  - ../../base

patches:
  - target:
      kind: Elasticsearch
      name: greenearth
    patch: |-
      - op: replace
        path: /spec/nodeSets/0/config/node.store.allow_mmap
        value: false

configMapGenerator:
  - name: index-settings
    behavior: replace
    literals:
      - index_shards=1
      - index_replicas=0
      - hashtag_index_shards=1
      - hashtag_index_replicas=0
      - inference_index_shards=1
      - inference_index_replicas=0
      - inference_max_age=10m