apiVersion: batch/v1
kind: Job
metadata:
  name: elasticsearch-bootstrap
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: bootstrap
        image: curlimages/curl:8.4.0
        env:
        - name: ES_SERVICE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: es-service-user-secret
              key: password
        - name: INFERENCE_MAX_AGE
          valueFrom:
            configMapKeyRef:
              name: index-settings
              key: inference_max_age
        - name: ILM_DELETE_AGE
          valueFrom:
            configMapKeyRef:
              name: ilm-settings
              key: ilm_delete_age
        - name: ILM_FORCEMERGE_AGE
          valueFrom:
            configMapKeyRef:
              name: ilm-settings
              key: ilm_forcemerge_age
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Waiting for Elasticsearch to be ready..."

          # Wait for Elasticsearch to be available
          until curl -k -s -u "es-service-user:$ES_SERVICE_PASSWORD" -o /dev/null -w "%{http_code}" https://greenearth-es-http:9200/ | grep -q "200"; do
            echo "Waiting for Elasticsearch..."
            sleep 10
          done

          echo "Elasticsearch is ready! Creating ILM policies..."

          curl -k --fail-with-body -X PUT "https://greenearth-es-http:9200/_ilm/policy/inferences_ilm_policy" \
            -u "es-service-user:$ES_SERVICE_PASSWORD" \
            -H "Content-Type: application/json" \
            -d "{\"policy\":{\"phases\":{\"hot\":{\"min_age\":\"0ms\",\"actions\":{\"rollover\":{\"max_age\":\"$INFERENCE_MAX_AGE\"}}},\"delete\":{\"min_age\":\"0ms\",\"actions\":{\"delete\":{}}}}}}"

          ILM_DELETE_POLICY="{\"policy\":{\"phases\":{\"delete\":{\"min_age\":\"$ILM_DELETE_AGE\",\"actions\":{\"delete\":{}}}}}}"
          ILM_FORCEMERGE_POLICY="{\"policy\":{\"phases\":{\"warm\":{\"min_age\":\"$ILM_FORCEMERGE_AGE\",\"actions\":{\"forcemerge\":{\"max_num_segments\":1}}},\"delete\":{\"min_age\":\"$ILM_DELETE_AGE\",\"actions\":{\"delete\":{}}}}}}"

          curl -k --fail-with-body -X PUT "https://greenearth-es-http:9200/_ilm/policy/posts_ilm_policy" \
            -u "es-service-user:$ES_SERVICE_PASSWORD" \
            -H "Content-Type: application/json" \
            -d "$ILM_FORCEMERGE_POLICY"

          curl -k --fail-with-body -X PUT "https://greenearth-es-http:9200/_ilm/policy/replies_ilm_policy" \
            -u "es-service-user:$ES_SERVICE_PASSWORD" \
            -H "Content-Type: application/json" \
            -d "$ILM_FORCEMERGE_POLICY"

          curl -k --fail-with-body -X PUT "https://greenearth-es-http:9200/_ilm/policy/likes_ilm_policy" \
            -u "es-service-user:$ES_SERVICE_PASSWORD" \
            -H "Content-Type: application/json" \
            -d "$ILM_DELETE_POLICY"

          curl -k --fail-with-body -X PUT "https://greenearth-es-http:9200/_ilm/policy/tombstones_ilm_policy" \
            -u "es-service-user:$ES_SERVICE_PASSWORD" \
            -H "Content-Type: application/json" \
            -d "$ILM_DELETE_POLICY"

          echo "ILM policies created! Applying index templates..."

          # Helper function to check if index exists
          index_exists() {
            local index_name=$1
            local status_code=$(curl -k -s -o /dev/null -w "%{http_code}" \
              -u "es-service-user:$ES_SERVICE_PASSWORD" \
              "https://greenearth-es-http:9200/$index_name")
            [ "$status_code" = "200" ]
          }

          # Helper function to apply template and create index if needed
          apply_template_and_index() {
            local template_name=$1
            local template_file=$2
            local index_name=$3
            local alias_file=$4

            echo "Applying $template_name template..."
            curl -k -X PUT "https://greenearth-es-http:9200/_index_template/$template_name" \
              -u "es-service-user:$ES_SERVICE_PASSWORD" \
              -H "Content-Type: application/json" \
              -d @/templates/$template_file

            if index_exists "$index_name"; then
              echo "$index_name already exists - template updated, skipping index creation"
            else
              echo "$index_name does not exist - creating index and alias"
              curl -k -X PUT "https://greenearth-es-http:9200/$index_name" \
                -u "es-service-user:$ES_SERVICE_PASSWORD" \
                -H "Content-Type: application/json"

              echo "Applying alias for $index_name..."
              curl -k -X POST "https://greenearth-es-http:9200/_aliases" \
                -u "es-service-user:$ES_SERVICE_PASSWORD" \
                -H "Content-Type: application/json" \
                -d @/aliases/$alias_file
            fi
            echo "$template_name completed!"
          }

          # Helper function to check if an alias has any backing indices
          alias_has_members() {
            local alias_name=$1
            local status_code=$(curl -k -s -o /dev/null -w "%{http_code}" \
              -u "es-service-user:$ES_SERVICE_PASSWORD" \
              "https://greenearth-es-http:9200/*/_alias/$alias_name")
            [ "$status_code" = "200" ]
          }

          # Apply ILM index templates (period-based indices created by ingest service via EnsureIndex)
          echo "Applying posts_ilm_template template..."
          curl -k -X PUT "https://greenearth-es-http:9200/_index_template/posts_ilm_template" \
            -u "es-service-user:$ES_SERVICE_PASSWORD" \
            -H "Content-Type: application/json" \
            -d @/templates/posts-ilm-index-template.json
          echo "posts_ilm_template completed!"

          echo "Applying likes_ilm_template template..."
          curl -k -X PUT "https://greenearth-es-http:9200/_index_template/likes_ilm_template" \
            -u "es-service-user:$ES_SERVICE_PASSWORD" \
            -H "Content-Type: application/json" \
            -d @/templates/likes-ilm-index-template.json
          echo "likes_ilm_template completed!"

          echo "Applying post_tombstones_ilm_template template..."
          curl -k -X PUT "https://greenearth-es-http:9200/_index_template/post_tombstones_ilm_template" \
            -u "es-service-user:$ES_SERVICE_PASSWORD" \
            -H "Content-Type: application/json" \
            -d @/templates/post-tombstones-ilm-index-template.json
          echo "post_tombstones_ilm_template completed!"

          echo "Applying replies_ilm_template template..."
          curl -k -X PUT "https://greenearth-es-http:9200/_index_template/replies_ilm_template" \
            -u "es-service-user:$ES_SERVICE_PASSWORD" \
            -H "Content-Type: application/json" \
            -d @/templates/replies-ilm-index-template.json
          echo "replies_ilm_template completed!"

          echo "Applying reply_tombstones_ilm_template template..."
          curl -k -X PUT "https://greenearth-es-http:9200/_index_template/reply_tombstones_ilm_template" \
            -u "es-service-user:$ES_SERVICE_PASSWORD" \
            -H "Content-Type: application/json" \
            -d @/templates/reply-tombstones-ilm-index-template.json
          echo "reply_tombstones_ilm_template completed!"

          echo "Applying like_tombstones_ilm_template template..."
          curl -k -X PUT "https://greenearth-es-http:9200/_index_template/like_tombstones_ilm_template" \
            -u "es-service-user:$ES_SERVICE_PASSWORD" \
            -H "Content-Type: application/json" \
            -d @/templates/like-tombstones-ilm-index-template.json
          echo "like_tombstones_ilm_template completed!"

          # Hashtags: apply template and create index+alias if needed
          apply_template_and_index "hashtags_template" "hashtags-index-template.json" "hashtags_v1" "hashtags-alias.json"

          # Inferences: apply template and create initial index only if alias has no members
          echo "Applying inferences_template template..."
          curl -k -X PUT "https://greenearth-es-http:9200/_index_template/inferences_template" \
            -u "es-service-user:$ES_SERVICE_PASSWORD" \
            -H "Content-Type: application/json" \
            -d @/templates/inferences-index-template.json

          if alias_has_members "inferences"; then
            echo "inferences alias already has members - skipping index creation"
          else
            echo "inferences alias is empty - creating inferences-000001 with write alias"
            curl -k -X PUT "https://greenearth-es-http:9200/inferences-000001" \
              -u "es-service-user:$ES_SERVICE_PASSWORD" \
              -H "Content-Type: application/json" \
              -d '{"aliases":{"inferences":{"is_write_index":true}}}'
          fi
          echo "inferences_template completed!"

          echo "Bootstrap completed successfully!"
        volumeMounts:
        - name: templates
          mountPath: /templates
        - name: aliases
          mountPath: /aliases
      volumes:
      - name: templates
        projected:
          sources:
          - configMap:
              name: hashtags-index-template
          - configMap:
              name: inferences-index-template
          - configMap:
              name: posts-ilm-index-template
          - configMap:
              name: likes-ilm-index-template
          - configMap:
              name: post-tombstones-ilm-index-template
          - configMap:
              name: like-tombstones-ilm-index-template
          - configMap:
              name: replies-ilm-index-template
          - configMap:
              name: reply-tombstones-ilm-index-template
      - name: aliases
        projected:
          sources:
          - configMap:
              name: hashtags-alias
