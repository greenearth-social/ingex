apiVersion: batch/v1
kind: Job
metadata:
  name: elasticsearch-bootstrap
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: bootstrap
        image: curlimages/curl:8.4.0
        env:
        - name: ES_SERVICE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: es-service-user-secret
              key: password
        - name: INFERENCE_MAX_AGE
          valueFrom:
            configMapKeyRef:
              name: index-settings
              key: inference_max_age
        - name: ILM_DELETE_AGE
          valueFrom:
            configMapKeyRef:
              name: ilm-settings
              key: ilm_delete_age
        - name: INDEX_PERIOD
          valueFrom:
            configMapKeyRef:
              name: ilm-settings
              key: index_period
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Waiting for Elasticsearch to be ready..."

          # Wait for Elasticsearch to be available
          until curl -k -s -u "es-service-user:$ES_SERVICE_PASSWORD" -o /dev/null -w "%{http_code}" https://greenearth-es-http:9200/ | grep -q "200"; do
            echo "Waiting for Elasticsearch..."
            sleep 10
          done

          echo "Elasticsearch is ready! Creating ILM policies..."

          curl -k --fail-with-body -X PUT "https://greenearth-es-http:9200/_ilm/policy/inferences_ilm_policy" \
            -u "es-service-user:$ES_SERVICE_PASSWORD" \
            -H "Content-Type: application/json" \
            -d "{\"policy\":{\"phases\":{\"hot\":{\"min_age\":\"0ms\",\"actions\":{\"rollover\":{\"max_age\":\"$INFERENCE_MAX_AGE\"}}},\"delete\":{\"min_age\":\"0ms\",\"actions\":{\"delete\":{}}}}}}"

          ILM_DELETE_POLICY="{\"policy\":{\"phases\":{\"delete\":{\"min_age\":\"$ILM_DELETE_AGE\",\"actions\":{\"delete\":{}}}}}}"

          curl -k --fail-with-body -X PUT "https://greenearth-es-http:9200/_ilm/policy/posts_ilm_policy" \
            -u "es-service-user:$ES_SERVICE_PASSWORD" \
            -H "Content-Type: application/json" \
            -d "$ILM_DELETE_POLICY"

          curl -k --fail-with-body -X PUT "https://greenearth-es-http:9200/_ilm/policy/likes_ilm_policy" \
            -u "es-service-user:$ES_SERVICE_PASSWORD" \
            -H "Content-Type: application/json" \
            -d "$ILM_DELETE_POLICY"

          curl -k --fail-with-body -X PUT "https://greenearth-es-http:9200/_ilm/policy/tombstones_ilm_policy" \
            -u "es-service-user:$ES_SERVICE_PASSWORD" \
            -H "Content-Type: application/json" \
            -d "$ILM_DELETE_POLICY"

          echo "ILM policies created! Applying index templates..."

          # Helper function to check if index exists
          index_exists() {
            local index_name=$1
            local status_code=$(curl -k -s -o /dev/null -w "%{http_code}" \
              -u "es-service-user:$ES_SERVICE_PASSWORD" \
              "https://greenearth-es-http:9200/$index_name")
            [ "$status_code" = "200" ]
          }

          # Helper function to apply template and create index if needed
          apply_template_and_index() {
            local template_name=$1
            local template_file=$2
            local index_name=$3
            local alias_file=$4

            echo "Applying $template_name template..."
            curl -k -X PUT "https://greenearth-es-http:9200/_index_template/$template_name" \
              -u "es-service-user:$ES_SERVICE_PASSWORD" \
              -H "Content-Type: application/json" \
              -d @/templates/$template_file

            if index_exists "$index_name"; then
              echo "$index_name already exists - template updated, skipping index creation"
            else
              echo "$index_name does not exist - creating index and alias"
              curl -k -X PUT "https://greenearth-es-http:9200/$index_name" \
                -u "es-service-user:$ES_SERVICE_PASSWORD" \
                -H "Content-Type: application/json"

              echo "Applying alias for $index_name..."
              curl -k -X POST "https://greenearth-es-http:9200/_aliases" \
                -u "es-service-user:$ES_SERVICE_PASSWORD" \
                -H "Content-Type: application/json" \
                -d @/aliases/$alias_file
            fi
            echo "$template_name completed!"
          }

          # Apply templates and create indices
          apply_template_and_index "posts_template" "posts-index-template.json" "posts_v1" "posts-alias.json"
          apply_template_and_index "post_tombstones_template" "post-tombstones-index-template.json" "post_tombstones_v1" "post-tombstones-alias.json"
          apply_template_and_index "likes_template" "likes-index-template.json" "likes_v1" "likes-alias.json"
          apply_template_and_index "like_tombstones_template" "like-tombstones-index-template.json" "like_tombstones_v1" "like-tombstones-alias.json"
          apply_template_and_index "hashtags_template" "hashtags-index-template.json" "hashtags_v1" "hashtags-alias.json"
          echo "Applying inferences_template template..."
          curl -k -X PUT "https://greenearth-es-http:9200/_index_template/inferences_template" \
            -u "es-service-user:$ES_SERVICE_PASSWORD" \
            -H "Content-Type: application/json" \
            -d @/templates/inferences-index-template.json

          if index_exists "inferences-000001"; then
            echo "inferences-000001 already exists - template updated, skipping index creation"
          else
            echo "inferences-000001 does not exist - creating index with write alias"
            curl -k -X PUT "https://greenearth-es-http:9200/inferences-000001" \
              -u "es-service-user:$ES_SERVICE_PASSWORD" \
              -H "Content-Type: application/json" \
              -d '{"aliases":{"inferences":{"is_write_index":true}}}'
          fi
          echo "inferences_template completed!"

          # Compute the current period index name using the same logic as the ingest service.
          # INDEX_PERIOD values: "week" → YYYY-wWW, "hour" → YYYY-MM-DD-HH, "10min" → YYYY-MM-DD-HH-MM
          current_period_suffix() {
            case "$INDEX_PERIOD" in
              week)
                date -u +%G-w%V ;;
              hour)
                date -u +%Y-%m-%d-%H ;;
              10min)
                # Truncate minutes to the nearest 10
                HH=$(date -u +%H)
                MM=$(date -u +%M)
                MM10=$(( (MM / 10) * 10 ))
                printf "%s-%02d" "$(date -u +%Y-%m-%d)-$HH" "$MM10" ;;
              *)
                date -u +%G-w%V ;;
            esac
          }

          # Helper to apply an ILM index template and create the initial period index.
          # Args: template_name template_file alias_name
          #
          # Index creation is separated from the alias write-target assignment so
          # that this function is idempotent even when another index in the alias
          # is already the write target (e.g. a _v1 index from a prior deployment).
          apply_ilm_template_and_index() {
            local template_name=$1
            local template_file=$2
            local alias_name=$3
            local kebab_name=$(echo "$alias_name" | tr '_' '-')
            local index_name="${kebab_name}-$(current_period_suffix)"

            echo "Applying $template_name template..."
            curl -k -X PUT "https://greenearth-es-http:9200/_index_template/$template_name" \
              -u "es-service-user:$ES_SERVICE_PASSWORD" \
              -H "Content-Type: application/json" \
              -d @/templates/$template_file

            if index_exists "$index_name"; then
              echo "$index_name already exists - skipping index creation"
            else
              echo "Creating initial ILM index $index_name..."
              curl -k --fail-with-body -X PUT "https://greenearth-es-http:9200/$index_name" \
                -u "es-service-user:$ES_SERVICE_PASSWORD" \
                -H "Content-Type: application/json"
            fi

            # Atomically set $index_name as the write target for $alias_name.
            # Collect all current alias members and clear their is_write_index flag
            # so that there is never more than one write index at a time.
            echo "Setting $index_name as write index for alias $alias_name..."
            CURRENT_MEMBERS=$(curl -k -s -u "es-service-user:$ES_SERVICE_PASSWORD" \
              "https://greenearth-es-http:9200/*/_alias/$alias_name" 2>/dev/null | \
              grep -o "\"[^\"]*\":{\"aliases\":{\"$alias_name\"" | \
              grep -o '^"[^"]*"' | tr -d '"' || true)

            ALIAS_ACTIONS=""
            for idx in $CURRENT_MEMBERS; do
              if [ "$idx" != "$index_name" ]; then
                ALIAS_ACTIONS="${ALIAS_ACTIONS}{\"add\":{\"index\":\"$idx\",\"alias\":\"$alias_name\",\"is_write_index\":false}},"
              fi
            done
            ALIAS_ACTIONS="${ALIAS_ACTIONS}{\"add\":{\"index\":\"$index_name\",\"alias\":\"$alias_name\",\"is_write_index\":true}}"

            curl -k --fail-with-body -X POST "https://greenearth-es-http:9200/_aliases" \
              -u "es-service-user:$ES_SERVICE_PASSWORD" \
              -H "Content-Type: application/json" \
              -d "{\"actions\":[$ALIAS_ACTIONS]}"

            echo "$template_name completed!"
          }

          apply_ilm_template_and_index "posts_ilm_template" "posts-ilm-index-template.json" "posts"
          apply_ilm_template_and_index "likes_ilm_template" "likes-ilm-index-template.json" "likes"
          apply_ilm_template_and_index "post_tombstones_ilm_template" "post-tombstones-ilm-index-template.json" "post_tombstones"
          apply_ilm_template_and_index "like_tombstones_ilm_template" "like-tombstones-ilm-index-template.json" "like_tombstones"

          echo "Bootstrap completed successfully!"
        volumeMounts:
        - name: templates
          mountPath: /templates
        - name: aliases
          mountPath: /aliases
      volumes:
      - name: templates
        projected:
          sources:
          - configMap:
              name: posts-index-template
          - configMap:
              name: post-tombstones-index-template
          - configMap:
              name: likes-index-template
          - configMap:
              name: like-tombstones-index-template
          - configMap:
              name: hashtags-index-template
          - configMap:
              name: inferences-index-template
          - configMap:
              name: posts-ilm-index-template
          - configMap:
              name: likes-ilm-index-template
          - configMap:
              name: post-tombstones-ilm-index-template
          - configMap:
              name: like-tombstones-ilm-index-template
      - name: aliases
        projected:
          sources:
          - configMap:
              name: posts-alias
          - configMap:
              name: post-tombstones-alias
          - configMap:
              name: likes-alias
          - configMap:
              name: like-tombstones-alias
          - configMap:
              name: hashtags-alias
