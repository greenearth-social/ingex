apiVersion: v1
kind: ConfigMap
metadata:
  name: reply-tombstones-ilm-index-template
data:
  reply-tombstones-ilm-index-template.json: |
    {
      "index_patterns": ["reply-tombstones-*"],
      "template": {
        "settings": {
          "number_of_shards": $(TOMBSTONES_INDEX_SHARDS),
          "number_of_replicas": $(TOMBSTONES_INDEX_REPLICAS),
          "refresh_interval": "30s",
          "translog.durability": "async",
          "translog.sync_interval": "30s",
          "lifecycle": {
            "name": "tombstones_ilm_policy"
          }
        },
        "mappings": {
          "_routing": {
            "required": true
          },
          "properties": {
            "at_uri": {
              "type": "keyword",
              "index": true
            },
            "author_did": {
              "type": "keyword",
              "index": true
            },
            "deleted_at": {
              "type": "date",
              "format": "iso8601"
            },
            "indexed_at": {
              "type": "date",
              "format": "iso8601"
            }
          }
        }
      }
    }
